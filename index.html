<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STICK VS DEAD — A Zombie Apocalypse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Oswald:wght@700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Oswald', sans-serif;
  }
  #title-screen {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1s;
  }
  #title-screen h1 {
    font-family: 'Creepster', cursive;
    font-size: 72px;
    color: #ff2200;
    text-shadow: 0 0 30px #ff2200, 0 0 60px #ff0000;
    letter-spacing: 4px;
    animation: flicker 2s infinite;
  }
  #title-screen p {
    color: #888; font-size: 18px; margin-top: 10px; letter-spacing: 3px;
  }
  #title-screen button {
    margin-top: 40px;
    padding: 14px 48px;
    background: #ff2200; color: #fff;
    border: none; font-family: 'Oswald', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    cursor: pointer; border-radius: 4px;
    box-shadow: 0 0 20px #ff2200;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #title-screen button:hover { transform: scale(1.05); box-shadow: 0 0 40px #ff2200; }
  @keyframes flicker {
    0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:0.4} 94%{opacity:1} 96%{opacity:0.7} 97%{opacity:1}
  }
  #cartoon-wrap {
    display: none; flex-direction: column; align-items: center; gap: 12px;
  }
  canvas {
    border: 3px solid #333;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(255,34,0,0.3);
    background: #1a1a2e;
  }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 800px; padding: 0 4px;
  }
  #scene-label {
    color: #ff4400; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
  }
  #timer-display {
    color: #888; font-size: 14px; letter-spacing: 1px;
  }
  #progress-bar-wrap {
    width: 800px; height: 6px; background: #222; border-radius: 3px; overflow: hidden;
  }
  #progress-bar {
    height: 100%; background: linear-gradient(90deg, #ff2200, #ff6600);
    width: 0%; transition: width 0.3s;
  }
  #credits {
    display: none; position: fixed; inset: 0;
    background: #0a0a0a;
    flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center;
  }
  #credits h2 { font-family:'Creepster',cursive; font-size:52px; color:#ff2200; margin-bottom:20px; }
  #credits p { color:#888; font-size:16px; line-height:2; }
</style>
</head>
<body>

<div id="title-screen">
  <h1>STICK VS DEAD</h1>
  <p>A ZOMBIE APOCALYPSE SURVIVAL CARTOON</p>
  <button onclick="startCartoon()">▶ PLAY (5 min)</button>
</div>

<div id="cartoon-wrap">
  <div id="hud">
    <span id="scene-label">SCENE 1</span>
    <span id="timer-display">0:00 / 5:00</span>
    <button id="mute-btn" onclick="toggleMute()" style="background:#333;color:#aaa;border:1px solid #555;padding:4px 14px;font-family:Oswald,sans-serif;font-size:13px;cursor:pointer;border-radius:3px;letter-spacing:1px;">🔊 SOUND ON</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <canvas id="c" width="800" height="450"></canvas>
</div>

<div id="credits">
  <h2>🧟 SURVIVED! 🧟</h2>
  <p>Stick Man lived to see another day...<br>but at what cost?<br><br>
  <span style="color:#ff4400">THE END</span><br><br>
  <span style="color:#555;font-size:13px">Written, directed & animated in HTML Canvas<br>No actual zombies were harmed</span></p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// Safety wrapper: prevent negative/zero radius from crashing the canvas
const _arc = ctx.arc.bind(ctx);
ctx.arc = function(x, y, r, ...rest) {
  if(r <= 0) return;
  _arc(x, y, r, ...rest);
};

let startTime, animFrame, elapsed = 0;
const TOTAL = 300; // 5 minutes in seconds

// ── FULL AUDIO ENGINE ────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain(); masterGain.gain.value = 0.7; masterGain.connect(AC.destination);

// Reverb convolver for spooky echo
let reverb;
(async () => {
  const len = AC.sampleRate * 2.5;
  const buf = AC.createBuffer(2, len, AC.sampleRate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.5);}
  reverb = AC.createConvolver(); reverb.buffer = buf;
  const rg = AC.createGain(); rg.gain.value = 0.18;
  reverb.connect(rg); rg.connect(masterGain);
})();

function withReverb(node) { if(reverb) node.connect(reverb); }

// ── Core synth primitives ────────────────────────────────────────────────────
function osc(freq, type, start, dur, vol, freq2) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, start);
  if(freq2) o.frequency.linearRampToValueAtTime(freq2, start+dur);
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(vol, start+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  o.connect(g); g.connect(masterGain); withReverb(g);
  o.start(start); o.stop(start+dur+0.05);
}

function noise(dur, vol, start, filterFreq=800) {
  const len = AC.sampleRate * dur;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  const src = AC.createBufferSource();
  src.buffer = buf;
  const filt = AC.createBiquadFilter();
  filt.type='lowpass'; filt.frequency.value = filterFreq;
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, start);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur);
  src.connect(filt); filt.connect(g); g.connect(masterGain);
  src.start(start); src.stop(start+dur+0.05);
}

// ── Sound effects ────────────────────────────────────────────────────────────
function groan() {
  const t = AC.currentTime;
  const freq = 70 + Math.random()*50;
  osc(freq, 'sawtooth', t, 0.05, 0.12);
  osc(freq*1.5, 'sawtooth', t+0.05, 0.4, 0.06, freq*0.7);
  osc(freq*0.5, 'sine', t, 0.7, 0.08, freq*0.4);
  noise(0.3, 0.04, t+0.1, 200);
}

function footstep() {
  const t = AC.currentTime;
  noise(0.08, 0.15, t, 300);
  osc(80, 'sine', t, 0.08, 0.1, 40);
}

function swing() {
  const t = AC.currentTime;
  osc(400, 'sawtooth', t, 0.05, 0.08, 150);
  osc(800, 'square', t, 0.03, 0.05, 200);
  noise(0.1, 0.1, t, 2000);
}

function smash() {
  const t = AC.currentTime;
  noise(0.3, 0.25, t, 1500);
  osc(120, 'square', t, 0.2, 0.12, 40);
  osc(60, 'sine', t, 0.15, 0.15, 30);
}

function heartbeat() {
  const t = AC.currentTime;
  osc(55, 'sine', t, 0.12, 0.2);
  noise(0.06, 0.08, t, 100);
  osc(50, 'sine', t+0.18, 0.1, 0.15);
  noise(0.05, 0.06, t+0.18, 80);
}

function scream() {
  const t = AC.currentTime;
  osc(600, 'sawtooth', t, 0.04, 0.15, 900);
  osc(900, 'sawtooth', t+0.04, 0.3, 0.1, 500);
  osc(400, 'square', t, 0.35, 0.05, 200);
}

function victoryFanfare() {
  const t = AC.currentTime;
  const melody = [523,659,784,1047];
  melody.forEach((f,i) => {
    osc(f, 'square', t+i*0.15, 0.2, 0.12);
    osc(f*0.5, 'sine', t+i*0.15, 0.2, 0.06);
  });
  setTimeout(()=>{
    const t2 = AC.currentTime;
    [523,587,659,784,880,1047].forEach((f,i)=>{
      osc(f,'triangle',t2+i*0.1,0.25,0.1);
    });
  }, 700);
}

function doorCreak() {
  const t = AC.currentTime;
  osc(180, 'sawtooth', t, 0.8, 0.08, 120);
  osc(200, 'sawtooth', t+0.1, 0.6, 0.05, 80);
  noise(0.4, 0.04, t, 400);
}

function windSound() {
  const t = AC.currentTime;
  noise(2.0, 0.04, t, 600);
  osc(80, 'sine', t, 2.0, 0.03, 60);
}

function firecrackle() {
  const t = AC.currentTime;
  for(let i=0;i<3;i++) {
    noise(0.05+Math.random()*0.08, 0.05+Math.random()*0.05, t+i*0.15, 2000+Math.random()*1000);
  }
}

// ── Procedural music engine ──────────────────────────────────────────────────
let musicInterval = null;
let currentMusicMode = '';

const SCALES = {
  creepy:  [55, 58, 62, 65, 67, 70, 72],
  tense:   [55, 57, 60, 62, 65, 67, 69],
  action:  [55, 59, 62, 66, 67, 71, 74],
  hopeful: [55, 59, 62, 64, 66, 71, 74],
  victory: [523, 587, 659, 784, 880]
};

function playMusicNote(scale, octMult=1) {
  const t = AC.currentTime;
  const notes = SCALES[scale];
  const freq = notes[Math.floor(Math.random()*notes.length)] * octMult;
  const types = ['sine','triangle'];
  osc(freq, types[Math.floor(Math.random()*types.length)], t, 0.4+Math.random()*0.5, 0.04+Math.random()*0.04);
}

function playBassNote(scale) {
  const t = AC.currentTime;
  const notes = SCALES[scale];
  const freq = notes[Math.floor(Math.random()*notes.length)] * 0.25;
  osc(freq, 'sine', t, 0.6, 0.06);
}

function startMusic(mode) {
  if(currentMusicMode === mode) return;
  stopMusic();
  currentMusicMode = mode;

  if(mode === 'calm') {
    musicInterval = setInterval(() => {
      if(Math.random()>0.4) playMusicNote('hopeful', 1);
      if(Math.random()>0.7) playMusicNote('hopeful', 0.5);
    }, 600);
  } else if(mode === 'creepy') {
    musicInterval = setInterval(() => {
      if(Math.random()>0.3) playMusicNote('creepy', 1);
      if(Math.random()>0.6) playBassNote('creepy');
      if(Math.random()>0.8) groan();
    }, 500);
  } else if(mode === 'chase') {
    musicInterval = setInterval(() => {
      playMusicNote('tense', 1);
      if(Math.random()>0.5) playMusicNote('tense', 2);
      if(Math.random()>0.6) playBassNote('tense');
      noise(0.08, 0.06, AC.currentTime, 500);
    }, 250);
  } else if(mode === 'hide') {
    musicInterval = setInterval(() => {
      if(Math.random()>0.6) playMusicNote('creepy', 0.5);
      if(Math.random()>0.8) playBassNote('creepy');
    }, 900);
  } else if(mode === 'action') {
    musicInterval = setInterval(() => {
      playMusicNote('action', 1);
      if(Math.random()>0.4) playMusicNote('action', 2);
      playBassNote('action');
      if(Math.random()>0.5) noise(0.06, 0.08, AC.currentTime, 800);
    }, 200);
  } else if(mode === 'hope') {
    musicInterval = setInterval(() => {
      playMusicNote('hopeful', 1);
      if(Math.random()>0.5) playMusicNote('hopeful', 2);
      if(Math.random()>0.7) playBassNote('hopeful');
    }, 400);
  } else if(mode === 'victory') {
    victoryFanfare();
    musicInterval = setInterval(() => {
      playMusicNote('victory', 1);
      if(Math.random()>0.5) playMusicNote('victory', 0.5);
    }, 350);
  }
}

function stopMusic() {
  if(musicInterval) { clearInterval(musicInterval); musicInterval=null; }
  currentMusicMode = '';
}

// ── Drawing helpers ──────────────────────────────────────────────────────────
function clear(color='#1a1a2e') {
  ctx.fillStyle = color; ctx.fillRect(0, 0, W, H);
}

function ground(y=350, color='#2d2d2d') {
  ctx.fillStyle = color; ctx.fillRect(0, y, W, H - y);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
}

function sky(t) {
  const grad = ctx.createLinearGradient(0,0,0,350);
  grad.addColorStop(0, t==='day'?'#1a3a5c':'#0a0a1a');
  grad.addColorStop(1, t==='day'?'#2a5a8c':'#1a0a2a');
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,350);
}

function moon(x,y) {
  ctx.fillStyle='#ffeeaa'; ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1a30'; ctx.beginPath(); ctx.arc(x+10,y-8,22,0,Math.PI*2); ctx.fill();
}

function star(x,y,s=2) {
  ctx.fillStyle='rgba(255,255,200,0.8)';
  ctx.fillRect(x,y,s,s);
}

function building(x, w, h, color='#1a1a1a') {
  ctx.fillStyle = color; ctx.fillRect(x, 350-h, w, h);
  // windows
  ctx.fillStyle='rgba(255,200,50,0.3)';
  for(let wy=350-h+10; wy<345; wy+=20) {
    for(let wx=x+8; wx<x+w-8; wx+=16) {
      if(Math.random()>0.4) ctx.fillRect(wx, wy, 8, 10);
    }
  }
}

function smoke(x,y,r,alpha) {
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#888';
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

// ── Stick Man ────────────────────────────────────────────────────────────────
function stick(x, y, opts={}) {
  const {
    legL=0, legR=0, armL=-0.8, armR=0.8,
    run=0, color='#e0e0e0', scared=false, dead=false,
    hat=false, weapon=null, facing=1
  } = opts;
  ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap='round';

  // head
  ctx.beginPath(); ctx.arc(x, y-38, 12, 0, Math.PI*2);
  ctx.stroke();
  // eyes
  ctx.fillStyle=scared?'#fff':color;
  ctx.beginPath(); ctx.arc(x+4*facing-3, y-40, scared?4:2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(x+4*facing-3, y-40, scared?2:1.5, 0, Math.PI*2); ctx.fill();
  if(dead) {
    ctx.strokeStyle='#ff2200'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x-6,y-44); ctx.lineTo(x-2,y-40); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x-2,y-44); ctx.lineTo(x-6,y-40); ctx.stroke();
  }
  // mouth
  ctx.strokeStyle=color; ctx.lineWidth=2;
  if(scared) {
    ctx.beginPath(); ctx.arc(x,y-32,5,0,Math.PI); ctx.stroke();
  } else if(!dead) {
    ctx.beginPath(); ctx.moveTo(x-4,y-31); ctx.lineTo(x+4,y-31); ctx.stroke();
  }
  ctx.lineWidth=3;

  // body
  ctx.beginPath(); ctx.moveTo(x,y-26); ctx.lineTo(x,y); ctx.stroke();

  // arms
  const aLx = x + Math.cos(armL)*28, aLy = y-18 + Math.sin(armL)*18;
  const aRx = x + Math.cos(armR)*28, aRy = y-18 + Math.sin(armR)*18;
  ctx.beginPath(); ctx.moveTo(x,y-18); ctx.lineTo(aLx, aLy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-18); ctx.lineTo(aRx, aRy); ctx.stroke();

  // legs
  const bob = run ? Math.sin(Date.now()/100)*20 : 0;
  const lLx = x - 14, lLy = y + 28 + (run?Math.sin(Date.now()/100)*8:legL);
  const lRx = x + 14, lRy = y + 28 + (run?Math.sin(Date.now()/100+Math.PI)*8:legR);
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(lLx, lLy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(lRx, lRy); ctx.stroke();

  // weapon
  if(weapon==='bat') {
    ctx.strokeStyle='#8B5E3C'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(aRx, aRy); ctx.lineTo(aRx+30*facing, aRy-20); ctx.stroke();
    ctx.fillStyle='#8B5E3C';
    ctx.beginPath(); ctx.ellipse(aRx+30*facing, aRy-20, 8, 4, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=3;
  }
  if(weapon==='pipe') {
    ctx.strokeStyle='#aaa'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(aRx, aRy); ctx.lineTo(aRx+35*facing, aRy-10); ctx.stroke();
    ctx.strokeStyle=color; ctx.lineWidth=3;
  }
  if(weapon==='torch') {
    ctx.strokeStyle='#8B5E3C'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(aLx, aLy); ctx.lineTo(aLx-5*facing, aLy-30); ctx.stroke();
    const flicker = Math.sin(Date.now()/80);
    ctx.fillStyle=`rgba(255,${150+flicker*50},0,0.9)`;
    ctx.beginPath(); ctx.arc(aLx-5*facing, aLy-38, Math.max(1, 8+flicker*2), 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,100,0.6)';
    ctx.beginPath(); ctx.arc(aLx-5*facing, aLy-36, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=3;
  }

  // hat
  if(hat) {
    ctx.fillStyle='#222';
    ctx.fillRect(x-14, y-54, 28, 6);
    ctx.fillRect(x-8, y-70, 16, 16);
  }
}

// ── Zombie ───────────────────────────────────────────────────────────────────
function zombie(x, y, opts={}) {
  const { phase=0, smashed=false, color='#4a7a4a' } = opts;
  if(smashed) {
    ctx.strokeStyle='#4a7a4a'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x-20,y); ctx.lineTo(x+20,y); ctx.stroke();
    ctx.beginPath(); ctx.arc(x, y-10, 10, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(100,200,100,0.4)';
    ctx.beginPath(); ctx.arc(x, y-10, 10, 0, Math.PI*2); ctx.fill();
    return;
  }
  const sway = Math.sin(Date.now()/200 + phase) * 8;
  ctx.strokeStyle=color; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(x, y-38+sway*0.3, 12, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(74,122,74,0.3)';
  ctx.beginPath(); ctx.arc(x, y-38+sway*0.3, 12, 0, Math.PI*2); ctx.fill();
  // X eyes
  ctx.strokeStyle='#ff4400'; ctx.lineWidth=2;
  [[-5,0],[5,0]].forEach(([ex])=>{
    ctx.beginPath(); ctx.moveTo(x+ex-3, y-41+sway*0.3); ctx.lineTo(x+ex+3, y-35+sway*0.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+ex+3, y-41+sway*0.3); ctx.lineTo(x+ex-3, y-35+sway*0.3); ctx.stroke();
  });
  ctx.strokeStyle=color; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(x,y-26+sway*0.3); ctx.lineTo(x,y); ctx.stroke();
  // droopy arms
  ctx.beginPath(); ctx.moveTo(x,y-20); ctx.lineTo(x-30+sway,y-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-20); ctx.lineTo(x+30+sway,y-10); ctx.stroke();
  // legs shamble
  const ls = Math.sin(Date.now()/300+phase)*15;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x-10+ls,y+28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+10-ls,y+28); ctx.stroke();
}

// ── Scene system ─────────────────────────────────────────────────────────────
// Each scene: {start, end, draw(t)} where t=0..1 within scene
const scenes = [];
function addScene(start, end, draw) { scenes.push({start,end,draw}); }

let runX = 50, zombiesSeen = 0, lastGroan = 0, lastHeartbeat = 0;

// ── SCENE 1: 0-30s — Normal Morning ─────────────────────────────────────────
addScene(0, 30, (t, e) => {
  sky('day');
  // sun rising
  const sunY = 80 - t * 20;
  ctx.fillStyle='#ffe066'; ctx.beginPath(); ctx.arc(700, sunY, 40, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,50,0.2)'; ctx.beginPath(); ctx.arc(700,sunY,70,0,Math.PI*2); ctx.fill();
  // city
  building(50,80,200,'#1e3040'); building(180,60,160,'#1a2a38');
  building(290,100,220,'#162030'); building(450,70,180,'#1e3040');
  building(600,90,200,'#121c28'); building(700,50,150,'#1a2a38');
  ground(350,'#2a2a2a');
  // title text
  if(t<0.5) {
    ctx.globalAlpha = t < 0.2 ? t/0.2 : (t>0.4?(0.5-t)/0.1:1);
    ctx.font = 'bold 28px Oswald'; ctx.fillStyle='#fff';
    ctx.textAlign='center'; ctx.fillText('A NORMAL MORNING...', W/2, 180);
    ctx.font='16px Oswald'; ctx.fillStyle='#aaa';
    ctx.fillText('...OR SO HE THOUGHT', W/2, 210);
    ctx.globalAlpha=1;
  }
  startMusic('calm');
  if(Math.floor(e*4) !== Math.floor((e-0.017)*4) && t>0.1) footstep();
  // Stick man walking left to right
  const mx = 80 + t * 200;
  stick(mx, 350, { run: true, facing: 1, color:'#e0e0e0' });
  // birds
  const bx = (t*1.2 % 1) * 900;
  ctx.strokeStyle='#666'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx, 80); ctx.quadraticCurveTo(bx+10,70,bx+20,80); ctx.stroke();

// ── SCENE 3: 70-120s — Chase Scene ───────────────────────────────────────────

// ── Helper ────────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function updateHUD(label, elapsed) {
  document.getElementById('scene-label').textContent = label;
  const mins = Math.floor(elapsed/60);
  const secs = Math.floor(elapsed%60).toString().padStart(2,'0');
  const tmins = Math.floor(TOTAL/60);
  const tsecs = (TOTAL%60).toString().padStart(2,'0');
  document.getElementById('timer-display').textContent = `${mins}:${secs} / ${tmins}:${tsecs}`;
  document.getElementById('progress-bar').style.width = (elapsed/TOTAL*100)+'%';
}

// ── Main loop ──────────────────────────────────────────────────────────────────
function loop(ts) {
  if(!startTime) startTime = ts;
  elapsed = Math.min((ts - startTime) / 1000, TOTAL);

  clear();
  let found = false;
  for(const s of scenes) {
    if(elapsed >= s.start && elapsed < s.end) {
      const t = (elapsed - s.start) / (s.end - s.start);
      s.draw(t, elapsed);
      found = true; break;
    }
  }
  if(!found && elapsed >= TOTAL) {
    showCredits(); return;
  }
  animFrame = requestAnimationFrame(loop);
}

function toggleMute() {
  const muted = masterGain.gain.value > 0;
  masterGain.gain.value = muted ? 0 : 0.7;
  document.getElementById('mute-btn').textContent = muted ? '🔇 MUTED' : '🔊 SOUND ON';
}

function showCredits() {
  cancelAnimationFrame(animFrame);
  stopMusic();
  document.getElementById('cartoon-wrap').style.display='none';
  const cr = document.getElementById('credits');
  cr.style.display='flex';
}

function startCartoon() {
  AC.resume();
  document.getElementById('title-screen').style.opacity='0';
  setTimeout(()=>{
    document.getElementById('title-screen').style.display='none';
    document.getElementById('cartoon-wrap').style.display='flex';
    animFrame = requestAnimationFrame(loop);
  }, 1000);
}
